<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_card.css" />
<style>
  .sw { width:120px; height:64px; border-radius:8px; border:1px solid var(--border); }
  .swc { display:flex; flex-direction:column; gap:6px; }
  .nm { font-family:var(--font-sans); font-size:12px; font-weight:700; color:var(--ink); letter-spacing:-0.02em; }
</style>
</head>
<body>
<div class="card">
  <span class="cap">Neutrals — subtly green-tinted greys (calm, "wellness")</span>
  <div class="row" style="gap:14px;">
    <div class="swc"><div class="sw" style="background:var(--muted-700);"></div><span class="nm">Muted 700</span><span class="mono">#868F89</span></div>
    <div class="swc"><div class="sw" style="background:var(--muted-600);"></div><span class="nm">Muted 600</span><span class="mono">#A8B2AB</span></div>
    <div class="swc"><div class="sw" style="background:var(--muted-500);"></div><span class="nm">Muted 500</span><span class="mono">#B9C2BC</span></div>
    <div class="swc"><div class="sw" style="background:var(--muted-400);"></div><span class="nm">Muted 400</span><span class="mono">#CBD1CD</span></div>
  </div>
</div>
</body>
</html>
