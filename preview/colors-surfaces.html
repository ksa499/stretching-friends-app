<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_card.css" />
<style>
  .sw { width:120px; height:64px; border-radius:8px; border:1px solid var(--border); }
  .swc { display:flex; flex-direction:column; gap:6px; }
  .nm { font-family:var(--font-sans); font-size:12px; font-weight:700; color:var(--ink); letter-spacing:-0.02em; }
</style>
</head>
<body>
<div class="card">
  <span class="cap">Surfaces — flat; separation via tint + hairline, no shadows</span>
  <div class="row" style="gap:14px;">
    <div class="swc"><div class="sw" style="background:var(--bg);"></div><span class="nm">Background</span><span class="mono">#FFFFFF</span></div>
    <div class="swc"><div class="sw" style="background:var(--surface);"></div><span class="nm">Surface · input</span><span class="mono">#F6F8F6</span></div>
    <div class="swc"><div class="sw" style="background:var(--border); border-color:var(--muted-500);"></div><span class="nm">Border · disabled</span><span class="mono">#EEF0EE</span></div>
  </div>
</div>
</body>
</html>
