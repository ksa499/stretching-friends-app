<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_card.css" />
<style>
  .nav { width:375px; height:81px; background:var(--bg); border-top:1px solid var(--border);
         display:flex; justify-content:space-between; align-items:flex-start; padding:12px 24px 32px; }
  .tab { display:flex; flex-direction:column; align-items:center; gap:4px; width:44px; color:var(--muted-600); }
  .tab .icon { width:22px; height:20px; }
  .tab span { font-family:var(--font-ui); font-weight:700; font-size:10px; letter-spacing:-0.023em; }
  .tab.active { color:var(--primary); }
</style>
</head>
<body>
<div class="card" style="padding:20px 0; align-items:center;">
  <span class="cap" style="padding:0 28px; align-self:flex-start;">Bottom navigation — 5 tabs, active = cyan &nbsp;(timeline/stretch/settings are flagged substitutes)</span>
  <div class="nav">
    <div class="tab"><i class="icon" data-icon="nav-home"></i><span>홈</span></div>
    <div class="tab active"><i class="icon" data-icon="people-empty"></i><span>친구</span></div>
    <div class="tab"><i class="icon" data-icon="nav-timeline"></i><span>타임라인</span></div>
    <div class="tab"><i class="icon" data-icon="nav-stretch"></i><span>스트레칭</span></div>
    <div class="tab"><i class="icon" data-icon="nav-settings"></i><span>설정</span></div>
  </div>
</div>
<script src="icons.js"></script>
</body>
</html>
