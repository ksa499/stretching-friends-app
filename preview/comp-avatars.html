<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_card.css" />
<style>
  .avatar { border-radius:9999px; background:var(--bg); border:1px solid var(--border);
            display:flex; align-items:flex-end; justify-content:center; overflow:hidden; flex:none; color:var(--muted-500); }
  .swc { display:flex; flex-direction:column; gap:8px; align-items:center; }
  .nm { font-family:var(--font-sans); font-size:12px; font-weight:700; color:var(--ink); }
</style>
</head>
<body>
<div class="card">
  <span class="cap">Avatar — white circle, hairline ring, grey person glyph</span>
  <div class="row" style="gap:28px; align-items:flex-end;">
    <div class="swc"><div class="avatar" style="width:32px;height:32px;"><i class="icon" data-icon="avatar-person" style="width:24px;height:28px;"></i></div><span class="nm">32 · search</span></div>
    <div class="swc"><div class="avatar" style="width:48px;height:48px;"><i class="icon" data-icon="avatar-person" style="width:36px;height:42px;"></i></div><span class="nm">48 · friend list</span></div>
    <div class="swc"><div class="avatar" style="width:64px;height:64px;background:var(--border);border:0;align-items:center;color:var(--muted-400);"><i class="icon" data-icon="people-empty" style="width:32px;height:25px;opacity:.7;"></i></div><span class="nm">64 · empty state</span></div>
  </div>
</div>
<script src="icons.js"></script>
</body>
</html>
