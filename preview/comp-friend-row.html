<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_card.css" />
<style>
  .avatar { width:48px;height:48px;border-radius:9999px; background:var(--bg); border:1px solid var(--border);
            display:flex; align-items:flex-end; justify-content:center; overflow:hidden; flex:none; color:var(--muted-500); }
  .btn { height:44px; padding:0 16px; border-radius:8px; background:var(--primary); color:#fff;
         font-family:var(--font-sans); font-weight:700; font-size:14px; letter-spacing:-0.03em;
         display:inline-flex; align-items:center; gap:8px; border:0; }
  .row2 { display:flex; align-items:center; justify-content:space-between; width:100%; }
</style>
</head>
<body>
<div class="card">
  <span class="cap">Friend row — avatar · name + presence · reminder button</span>
  <div class="row2">
    <div class="row" style="gap:0;">
      <div class="avatar"><i class="icon" data-icon="avatar-person" style="width:36px;height:42px;"></i></div>
      <div class="col" style="gap:2px; padding-left:16px;">
        <span class="t-name">Sarah Miller</span>
        <span class="t-meta">Active now</span>
      </div>
    </div>
    <button class="btn"><i class="icon" data-icon="remind-bell" style="width:13px;height:15px;"></i>알림보내기</button>
  </div>
</div>
<script src="icons.js"></script>
</body>
</html>
