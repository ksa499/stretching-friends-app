<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_card.css" />
<style>
  .box { width:84px; height:64px; background:var(--surface); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; }
  .swc { display:flex; flex-direction:column; gap:8px; align-items:center; }
  .nm { font-family:var(--font-sans); font-size:12px; font-weight:700; color:var(--ink); letter-spacing:-0.02em; }
</style>
</head>
<body>
<div class="card">
  <span class="cap">Corner radii</span>
  <div class="row" style="gap:22px;">
    <div class="swc"><div class="box" style="border-radius:6px;"></div><span class="nm">6 · sm</span><span class="mono">친구 추가</span></div>
    <div class="swc"><div class="box" style="border-radius:8px;"></div><span class="nm">8 · md</span><span class="mono">input / button / card</span></div>
    <div class="swc"><div class="box" style="border-radius:9999px; width:64px;"></div><span class="nm">full</span><span class="mono">avatar / pill</span></div>
  </div>
</div>
</body>
</html>
