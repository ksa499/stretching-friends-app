<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_card.css" />
<style>
  .tile { width:150px; height:80px; border-radius:8px; background:var(--bg); display:flex; align-items:center; justify-content:center; font-family:var(--font-sans); font-size:12px; font-weight:700; color:var(--ink); }
  .swc { display:flex; flex-direction:column; gap:8px; }
</style>
</head>
<body>
<div class="card">
  <span class="cap">Elevation — the app is near-flat; depth comes from borders &amp; tint</span>
  <div class="row" style="gap:24px;">
    <div class="swc"><div class="tile" style="border:1px solid var(--border);">Hairline</div><span class="mono">1px #EEF0EE — lists, nav, avatar ring</span></div>
    <div class="swc"><div class="tile" style="background:var(--surface);">Surface tint</div><span class="mono">#F6F8F6 — expanded / selected row</span></div>
    <div class="swc"><div class="tile" style="box-shadow:var(--shadow-float);">Float</div><span class="mono">0 8 24 rgba(34,41,38,.12) — toasts only</span></div>
  </div>
</div>
</body>
</html>
