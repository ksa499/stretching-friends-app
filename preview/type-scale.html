<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_card.css" />
</head>
<body>
<div class="card" style="gap:18px;">
  <div class="row" style="justify-content:space-between;">
    <span class="t-title">친구</span>
    <span class="mono">Title · Pretendard Bold · 24/1.4 · -0.03em</span>
  </div>
  <div class="row" style="justify-content:space-between;">
    <span class="t-name">Sarah Miller</span>
    <span class="mono">Name · Bold · 16</span>
  </div>
  <div class="row" style="justify-content:space-between;">
    <span class="t-body">Alex Johnson</span>
    <span class="mono">Body · Regular · 16</span>
  </div>
  <div class="row" style="justify-content:space-between;">
    <span class="t-label" style="color:var(--primary);">알림보내기</span>
    <span class="mono">Label / Button · Bold · 14</span>
  </div>
  <div class="row" style="justify-content:space-between;">
    <span class="t-section">최근 검색</span>
    <span class="mono">Section label · Bold · 14 · muted-600</span>
  </div>
  <div class="row" style="justify-content:space-between;">
    <span class="t-meta">Last active 2h ago</span>
    <span class="mono">Meta · Regular · 12 · ink-500</span>
  </div>
  <div class="row" style="justify-content:space-between;">
    <span class="t-nav">친구</span>
    <span class="mono">Nav · Inter Bold · 10 · -0.023em</span>
  </div>
</div>
</body>
</html>
